<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلن محتوایی سوشال مدیا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap" rel="stylesheet">
    <!-- کتابخانه تولید PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f1f5f9;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        .optimized-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            will-change: transform;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .optimized-card:hover {
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
        }
        .day-card {
            border-top: 5px solid #6366f1;
        }
        .post-entry:not(:last-child) {
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
        .image-preview-container {
            width: 100%;
            height: 140px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8fafc;
            border: 2px dashed #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .image-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 text-center md:text-right no-print">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">پلن محتوایی سوشال مدیا</h1>
                <p class="text-slate-500 mt-1 text-sm font-bold">تولید محتوای هوشمند با جزئیات دقیق</p>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="manualSave()" title="ذخیره وضعیت فعلی" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl transition-all shadow-md flex items-center gap-2 text-sm font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v13a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    ذخیره نهایی
                </button>
                <button onclick="exportData()" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 text-sm font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    بک‌آپ JSON
                </button>
                <button onclick="exportPDF()" class="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 text-sm font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                    PDF
                </button>
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2 text-sm font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    پست جدید
                </button>
            </div>
        </header>

        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print">
            <div class="optimized-card p-4 rounded-2xl">
                <p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">کل پست‌ها</p>
                <p id="stat-total" class="text-2xl font-black text-slate-800">۰</p>
            </div>
            <div class="optimized-card p-4 rounded-2xl border-r-4 border-amber-400">
                <p class="text-[10px] text-amber-500 font-bold mb-1 uppercase tracking-widest">پیش‌نویس</p>
                <p id="stat-draft" class="text-2xl font-black text-slate-800">۰</p>
            </div>
            <div class="optimized-card p-4 rounded-2xl border-r-4 border-blue-500">
                <p class="text-[10px] text-blue-500 font-bold mb-1 uppercase tracking-widest">زمان‌بندی</p>
                <p id="stat-scheduled" class="text-2xl font-black text-slate-800">۰</p>
            </div>
            <div class="optimized-card p-4 rounded-2xl border-r-4 border-emerald-500">
                <p class="text-[10px] text-emerald-500 font-bold mb-1 uppercase tracking-widest">منتشر شده</p>
                <p id="stat-published" class="text-2xl font-black text-slate-800">۰</p>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div id="pdf-content">
            <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center p-16 bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
            <div class="bg-indigo-50 p-6 rounded-full mb-4 text-indigo-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800">برنامه‌ای ثبت نشده است</h3>
        </div>
    </div>

    <!-- Main Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 no-print">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black text-slate-800">ثبت محتوا</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <form id="content-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 mr-1">تصویر پست</label>
                    <div id="image-container" class="image-preview-container" onclick="document.getElementById('post-image-input').click()">
                        <div id="image-placeholder" class="text-center">
                            <svg class="mx-auto text-slate-300" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <span class="text-[10px] text-slate-400 mt-2 block">انتخاب تصویر</span>
                        </div>
                        <img id="image-preview" class="hidden" src="" alt="Preview">
                    </div>
                    <input type="file" id="post-image-input" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                    <button type="button" id="remove-image-btn" onclick="removeImage()" class="hidden text-[10px] text-rose-500 font-bold hover:underline">حذف تصویر</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">تاریخ</label>
                        <input type="date" id="post-date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">ساعت</label>
                        <input type="time" id="post-time" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 mr-1">عنوان محتوا</label>
                    <input type="text" id="post-title" required placeholder="مثلاً: نکات امنیتی در فضای مجازی" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                </div>

                <!-- باکس توضیحات برای هوش مصنوعی -->
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 mr-1">توضیحات تکمیلی (جهت راهنمایی هوش مصنوعی)</label>
                    <textarea id="post-desc" rows="2" placeholder="جزئیات بیشتری که می‌خواهید در کپشن باشد بنویسید..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm leading-6"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">پلتفرم</label>
                        <select id="post-platform" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50">
                            <option value="بله">بله</option>
                            <option value="ایتا">ایتا</option>
                            <option value="روبیکا">روبیکا</option>
                            <option value="اینستاگرام">اینستاگرام</option>
                            <option value="تلگرام">تلگرام</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">دسته محتوا</label>
                        <select id="post-category" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50">
                            <option value="اطلاع‌رسانی">اطلاع‌رسانی</option>
                            <option value="کمپین">کمپین</option>
                            <option value="آموزشی">آموزشی</option>
                            <option value="تعاملی">تعاملی</option>
                            <option value="ترند">ترند</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">کپشن (نیمه رسمی)</label>
                        <button type="button" id="ai-generate-btn" onclick="generateAICaption()" class="flex items-center gap-1.5 text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg transition-all group">
                            <svg id="ai-icon" class="group-hover:rotate-12 transition-transform" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                            <span>تولید هوشمند کپشن</span>
                        </button>
                    </div>
                    <textarea id="post-caption" rows="4" placeholder="کپشن نهایی اینجا تولید یا نوشته می‌شود..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm leading-6"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">قالب</label>
                        <select id="post-format" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50">
                            <option value="پست تصویری">پست تصویری</option>
                            <option value="ویدیو / Reel">ویدیو / Reel</option>
                            <option value="استوری">استوری</option>
                            <option value="کاروسل">کاروسل</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">وضعیت</label>
                        <select id="post-status" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50">
                            <option value="draft">پیش‌نویس</option>
                            <option value="scheduled">زمان‌بندی</option>
                            <option value="published">منتشر شده</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                    ذخیره در تقویم
                </button>
            </form>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[60] no-print">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
            <h4 class="text-xl font-bold text-slate-800 mb-2">حذف محتوا؟</h4>
            <div class="flex gap-3 mt-6">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">انصراف</button>
                <button id="btn-confirm-delete" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl">حذف کن</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-3 rounded-2xl shadow-xl transform translate-y-32 transition-transform duration-500 z-[100] no-print">
        <span id="toast-text"></span>
    </div>

    <script>
        const apiKey = ""; 
        let contentData = JSON.parse(localStorage.getItem('socialPlanDataV2')) || [];
        let pendingDeleteId = null;
        let currentImageBase64 = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    showToast("حجم تصویر حداکثر ۲ مگابایت باشد");
                    input.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageBase64 = e.target.result;
                    displayImagePreview(currentImageBase64);
                };
                reader.readAsDataURL(file);
            }
        }

        function displayImagePreview(base64) {
            const preview = document.getElementById('image-preview');
            const placeholder = document.getElementById('image-placeholder');
            const removeBtn = document.getElementById('remove-image-btn');
            preview.src = base64;
            preview.classList.remove('hidden');
            placeholder.classList.add('hidden');
            removeBtn.classList.remove('hidden');
        }

        function removeImage() {
            currentImageBase64 = null;
            document.getElementById('post-image-input').value = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-placeholder').classList.remove('hidden');
            document.getElementById('remove-image-btn').classList.add('hidden');
        }

        async function generateAICaption() {
            const title = document.getElementById('post-title').value;
            const description = document.getElementById('post-desc').value;
            const platform = document.getElementById('post-platform').value;
            const category = document.getElementById('post-category').value;
            const captionArea = document.getElementById('post-caption');
            const aiBtn = document.getElementById('ai-generate-btn');
            const aiIcon = document.getElementById('ai-icon');

            if (!title) {
                showToast("لطفاً ابتدا عنوان محتوا را وارد کنید");
                return;
            }

            aiBtn.disabled = true;
            aiBtn.classList.add('opacity-50', 'cursor-not-allowed');
            aiIcon.classList.add('animate-spin-custom');
            showToast("هوش مصنوعی در حال نوشتن کپشن...");

            const systemPrompt = `تو یک مدیر محتوای حرفه‌ای برای پیام‌رسان‌های ایرانی (بله، ایتا، روبیکا و تلگرام) هستی.
لحن تو باید "نیمه رسمی" و جذاب باشد.
متن تولیدی باید دارای ساختار زیر باشد:
1. یک تیتر جذاب با ایموجی مرتبط.
2. متن بدنه که بر اساس دسته محتوا (اطلاع‌رسانی، کمپین، آموزشی، تعاملی، ترند) تنظیم شده است.
3. استفاده از لیست‌های نشانه‌دار (Bulleted lists) برای خوانایی بیشتر در صورت نیاز.
4. پایان‌بندی با یک دعوت به اقدام (CTA) هوشمندانه.
5. استفاده از هشتگ‌های فارسی مرتبط در انتهای متن.
نکات مهم:
- اگر دسته "آموزشی" است، متن باید ساختار گام‌به‌گام داشته باشد.
- اگر دسته "تعاملی" است، حتما یک سوال در پایان بپرس.
- اگر دسته "کمپین" است، روی مزایا و محدودیت زمانی تاکید کن.
- زبان: فارسی.
- خروجی فقط شامل متن کپشن باشد.`;

            // اضافه کردن توضیحات تکمیلی به پرسش از هوش مصنوعی
            const userQuery = `یک کپشن برای پستی با عنوان "${title}" تولید کن.
توضیحات تکمیلی برای محتوا: "${description || 'بدون توضیحات اضافی'}"
این پست برای پلتفرم "${platform}" و با دسته محتوای "${category}" است.`;

            let retries = 0;
            const maxRetries = 3;
            
            async function callGemini() {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('API request failed');
                    const result = await response.json();
                    const aiCaption = result.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (aiCaption) {
                        captionArea.value = aiCaption.trim();
                        showToast("کپشن تولید شد ✨");
                    } else {
                        throw new Error('Empty response');
                    }
                } catch (error) {
                    if (retries < maxRetries) {
                        retries++;
                        await new Promise(res => setTimeout(res, 2000));
                        return callGemini();
                    }
                    showToast("خطا در هوش مصنوعی. دوباره تلاش کنید.");
                } finally {
                    aiBtn.disabled = false;
                    aiBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    aiIcon.classList.remove('animate-spin-custom');
                }
            }
            await callGemini();
        }

        function openModal(editId = null) {
            const modal = document.getElementById('modal');
            const form = document.getElementById('content-form');
            form.reset();
            removeImage();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = "ثبت محتوا";
            if(editId) {
                const item = contentData.find(i => i.id === editId);
                if(item) {
                    document.getElementById('modal-title').innerText = "ویرایش محتوا";
                    document.getElementById('edit-id').value = item.id;
                    document.getElementById('post-date').value = item.date;
                    document.getElementById('post-time').value = item.time || '';
                    document.getElementById('post-title').value = item.title;
                    document.getElementById('post-desc').value = item.description || '';
                    document.getElementById('post-platform').value = item.platform;
                    document.getElementById('post-category').value = item.category || 'اطلاع‌رسانی';
                    document.getElementById('post-format').value = item.format;
                    document.getElementById('post-caption').value = item.caption;
                    document.getElementById('post-status').value = item.status;
                    if (item.image) {
                        currentImageBase64 = item.image;
                        displayImagePreview(currentImageBase64);
                    }
                }
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        function manualSave() {
            saveToStorage();
            showToast("تغییرات با موفقیت ذخیره شدند ✅");
        }

        function openConfirmModal(id) {
            pendingDeleteId = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }

        function closeConfirmModal() {
            pendingDeleteId = null;
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        document.getElementById('btn-confirm-delete').addEventListener('click', function() {
            if(pendingDeleteId) {
                contentData = contentData.filter(i => i.id !== pendingDeleteId);
                saveAndRender();
                showToast("پست حذف شد");
                closeConfirmModal();
            }
        });

        document.getElementById('content-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const newItem = {
                id: editId || Date.now().toString(),
                date: document.getElementById('post-date').value,
                time: document.getElementById('post-time').value,
                title: document.getElementById('post-title').value,
                description: document.getElementById('post-desc').value,
                platform: document.getElementById('post-platform').value,
                category: document.getElementById('post-category').value,
                format: document.getElementById('post-format').value,
                caption: document.getElementById('post-caption').value,
                status: document.getElementById('post-status').value,
                image: currentImageBase64
            };
            if(editId) {
                const index = contentData.findIndex(i => i.id === editId);
                contentData[index] = newItem;
            } else {
                contentData.push(newItem);
            }
            saveAndRender();
            closeModal();
            showToast("در تقویم ثبت شد");
        });

        function saveToStorage() {
            localStorage.setItem('socialPlanDataV2', JSON.stringify(contentData));
        }

        function saveAndRender() {
            saveToStorage();
            renderDashboard();
            updateStats();
        }

        function getStatusUI(status) {
            const configs = {
                draft: { color: 'text-amber-500 bg-amber-50', icon: 'M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z' },
                scheduled: { color: 'text-blue-500 bg-blue-50', icon: 'M12 22c5.5 0 10-4.5 10-10S17.5 2 12 2 2 6.5 2 12s4.5 10 10 10zM12 6v6l4 2' },
                published: { color: 'text-emerald-500 bg-emerald-50', icon: 'M22 11v1a10 10 0 1 1-6-9M22 4L12 14l-3-3' }
            };
            const c = configs[status] || configs.draft;
            return `<div class="p-2 rounded-xl ${c.color} shadow-sm"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="${c.icon}"></path></svg></div>`;
        }

        function getPlatformColor(platform) {
            switch(platform) {
                case 'بله': return 'text-green-600 bg-green-50';
                case 'ایتا': return 'text-orange-500 bg-orange-50';
                case 'روبیکا': return 'text-purple-600 bg-purple-50';
                case 'اینستاگرام': return 'text-rose-600 bg-rose-50';
                case 'تلگرام': return 'text-sky-500 bg-sky-50';
                default: return 'text-indigo-600 bg-indigo-50';
            }
        }

        function renderDashboard() {
            const container = document.getElementById('cards-container');
            const empty = document.getElementById('empty-state');
            container.innerHTML = '';
            if(contentData.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const groups = {};
            contentData.forEach(i => {
                if(!groups[i.date]) groups[i.date] = [];
                groups[i.date].push(i);
            });

            const sortedDates = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));

            sortedDates.forEach(date => {
                const dayPosts = groups[date].sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));
                const dateObj = new Date(date);
                const formattedDate = dateObj.toLocaleDateString('fa-IR', { weekday: 'long', day: 'numeric', month: 'long' });

                const card = document.createElement('div');
                card.className = "optimized-card day-card rounded-[2rem] p-6 flex flex-col h-fit shadow-sm";
                
                let postsHtml = '';
                dayPosts.forEach(post => {
                    postsHtml += `
                        <div class="post-entry group">
                            <div class="flex items-start gap-4">
                                ${getStatusUI(post.status)}
                                <div class="flex-1">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-bold text-slate-800 text-sm mb-1">${post.title}</h4>
                                        <span class="text-[10px] font-black text-slate-400 font-mono">${post.time || '--:--'}</span>
                                    </div>
                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                        <span class="text-[9px] font-bold px-2 py-0.5 rounded-lg ${getPlatformColor(post.platform)}">${post.platform}</span>
                                        <span class="text-[9px] font-bold px-2 py-0.5 rounded-lg bg-slate-100 text-slate-600">${post.category || 'محتوا'}</span>
                                    </div>
                                    
                                    ${post.image ? `
                                        <div class="w-full h-32 rounded-xl overflow-hidden mb-3 border border-slate-100">
                                            <img src="${post.image}" class="w-full h-full object-cover">
                                        </div>
                                    ` : ''}

                                    ${post.caption ? `<p class="text-[11px] text-slate-600 line-clamp-3 mb-3 bg-slate-50 p-3 rounded-xl leading-6 whitespace-pre-wrap">${post.caption}</p>` : ''}
                                    
                                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all no-print">
                                        <button onclick="openModal('${post.id}')" class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors">ویرایش</button>
                                        <button onclick="openConfirmModal('${post.id}')" class="text-[10px] font-bold text-rose-500 bg-rose-50 px-3 py-1.5 rounded-lg hover:bg-rose-100 transition-colors">حذف</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                        <h3 class="font-black text-slate-700 text-sm">${formattedDate}</h3>
                        <span class="text-[10px] font-black text-slate-400 uppercase">${dayPosts.length} پست</span>
                    </div>
                    <div class="space-y-1">${postsHtml}</div>
                `;
                container.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = contentData.length.toLocaleString('fa-IR');
            document.getElementById('stat-draft').innerText = contentData.filter(i => i.status === 'draft').length.toLocaleString('fa-IR');
            document.getElementById('stat-scheduled').innerText = contentData.filter(i => i.status === 'scheduled').length.toLocaleString('fa-IR');
            document.getElementById('stat-published').innerText = contentData.filter(i => i.status === 'published').length.toLocaleString('fa-IR');
        }

        function exportData() {
            if(contentData.length === 0) return showToast("داده‌ای یافت نشد");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(contentData, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `Plan-Backup-${new Date().toISOString().split('T')[0]}.json`);
            dl.click();
        }

        function exportPDF() {
            if(contentData.length === 0) return showToast("محتوا وارد کنید");
            showToast("در حال تولید PDF...");
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: 5,
                filename: `Plan-${new Date().toLocaleDateString('fa-IR')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 1.5, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save().then(() => showToast("PDF آماده شد"));
        }

        window.onload = function() {
            renderDashboard();
            updateStats();
        };
    </script>
</body>
</html>
