<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلن محتوایی سوشال مدیا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap" rel="stylesheet">
    <!-- کتابخانه تولید PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #f1f5f9;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        .optimized-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            will-change: transform;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .optimized-card:hover {
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
        }
        .empty-day-card {
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            opacity: 0.7;
        }
        .day-card {
            border-top: 5px solid #6366f1;
        }
        .post-entry:not(:last-child) {
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        
        .image-preview-container {
            width: 100%;
            height: 140px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8fafc;
            border: 2px dashed #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .image-preview-container img { width: 100%; height: 100%; object-fit: cover; }

        @media print {
            .no-print { display: none !important; }
            #pdf-content { width: 800px !important; margin: 0 auto !important; padding: 10px !important; background: white !important; }
            #cards-container { display: block !important; width: 100% !important; }
            .optimized-card {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                margin-bottom: 30px !important;
                border: 2px solid #eee !important;
                width: 100% !important;
                display: block !important;
                box-shadow: none !important;
                border-radius: 20px !important;
                padding: 20px !important;
            }
            .day-card-header {
                display: block !important;
                position: relative !important;
                width: 100% !important;
                border-bottom: 2px solid #f0f0f0 !important;
                margin-bottom: 15px !important;
                padding-bottom: 10px !important;
                height: 40px !important;
            }
            .day-card-header h3 {
                position: absolute !important;
                right: 0 !important;
                top: 0 !important;
                font-size: 18px !important;
                font-weight: bold !important;
                color: #1e293b !important;
                margin: 0 !important;
                display: block !important;
            }
            .day-card-header .header-stats {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                text-align: left !important;
                display: block !important;
            }
            .post-count-badge {
                font-size: 12px !important;
                color: #64748b !important;
                background: #f1f5f9 !important;
                padding: 4px 10px !important;
                border-radius: 8px !important;
                display: inline-block !important;
            }
            .post-entry {
                page-break-inside: avoid !important;
                margin-top: 15px !important;
                padding-top: 15px !important;
                border-top: 1px solid #f8fafc !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 text-center md:text-right no-print">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">پلن محتوایی سوشال مدیا</h1>
                <p class="text-slate-500 mt-1 text-sm font-bold">تولید هوشمند محتوا با هوش مصنوعی</p>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="openSettingsModal()" title="تنظیمات" class="bg-slate-200 hover:bg-slate-300 text-slate-600 p-2.5 rounded-xl transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button onclick="manualSave()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl shadow-md flex items-center gap-2 text-sm font-bold">
                    ذخیره نهایی
                </button>
                <button onclick="exportPDF()" class="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold">
                    خروجی PDF
                </button>
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl shadow-md flex items-center gap-2 text-sm font-bold">
                    پست جدید
                </button>
            </div>
        </header>

        <!-- Stats Section -->
        <div id="stats-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print text-center">
            <!-- Stats will be injected here -->
        </div>

        <!-- Main Dashboard -->
        <div id="pdf-content">
            <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center p-16 bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
            <h3 class="text-lg font-bold text-slate-800">تقویم محتوایی خالی است</h3>
        </div>
    </div>

    <!-- Modal Settings -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[70] backdrop-blur-sm no-print">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 mb-6">تنظیمات هوش مصنوعی</h3>
            <div class="space-y-4 text-right">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">Google Gemini API Key</label>
                    <input type="password" id="user-api-key" placeholder="کلید خود را اینجا وارد کنید..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none text-sm">
                    <p class="text-[10px] text-slate-400 mt-2">کلید دریافتی از Google AI Studio را اینجا وارد کنید.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeSettingsModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">بستن</button>
                    <button onclick="saveSettings()" class="flex-1 bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900">ذخیره</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 no-print">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black text-slate-800">ثبت محتوا</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="content-form" class="space-y-4 text-right">
                <input type="hidden" id="edit-id">
                
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 mr-1">تصویر محتوا</label>
                    <div id="image-container" class="image-preview-container" onclick="document.getElementById('post-image-input').click()">
                        <div id="image-placeholder" class="text-center">
                            <svg class="mx-auto text-slate-300" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </div>
                        <img id="image-preview" class="hidden" src="" alt="Preview">
                    </div>
                    <input type="file" id="post-image-input" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                    <button type="button" id="remove-image-btn" onclick="removeImage()" class="hidden text-[10px] text-rose-500 font-bold">حذف عکس</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="post-date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                    <input type="time" id="post-time" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                </div>

                <input type="text" id="post-title" required placeholder="موضوع یا تیتر محتوا" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                <textarea id="post-desc" rows="2" placeholder="توضیحات بیشتر برای هوش مصنوعی..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 resize-none text-sm outline-none"></textarea>

                <div class="grid grid-cols-2 gap-4">
                    <select id="post-platform" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                        <option value="بله">بله</option><option value="ایتا">ایتا</option><option value="روبیکا">روبیکا</option><option value="اینستاگرام">اینستاگرام</option><option value="تلگرام">تلگرام</option>
                    </select>
                    <select id="post-category" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                        <option value="اطلاع‌رسانی">اطلاع‌رسانی</option>
                        <option value="معرفی">معرفی (محصول/خدمات)</option>
                        <option value="مناسبتی">مناسبتی</option>
                        <option value="آموزشی">آموزشی</option>
                        <option value="کمپین">کمپین</option>
                        <option value="تعاملی">تعاملی</option>
                        <option value="ترند">ترند</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs font-bold text-slate-500 mr-1">کپشن نهایی</label>
                        <button type="button" id="ai-generate-btn" onclick="generateAICaption()" class="flex items-center gap-1.5 text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg group transition-colors">
                            <svg id="ai-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                            <span>تولید با هوش مصنوعی</span>
                        </button>
                    </div>
                    <textarea id="post-caption" rows="5" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm leading-6 outline-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <select id="post-format" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                        <option value="پست تصویری">پست تصویری</option><option value="ویدیو / Reel">ویدیو / Reel</option><option value="استوری">استوری</option><option value="کاروسل">کاروسل</option>
                    </select>
                    <select id="post-status" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                        <option value="draft">پیش‌نویس</option><option value="scheduled">زمان‌بندی شده</option><option value="published">منتشر شده</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg">ثبت در تقویم</button>
            </form>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[60] no-print">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
            <h4 class="text-xl font-bold text-slate-800 mb-6 text-right">حذف این محتوا؟</h4>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">انصراف</button>
                <button id="btn-confirm-delete" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl hover:bg-rose-600">بله، حذف کن</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-3 rounded-2xl shadow-xl transform translate-y-32 transition-transform duration-500 z-[100] no-print">
        <span id="toast-text"></span>
    </div>

    <script>
        // دیتابیس لوکال
        let contentData = JSON.parse(localStorage.getItem('socialPlanDataV2')) || [];
        let pendingDeleteId = null;
        let currentImageBase64 = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 5000);
        }

        // تنظیمات API
        function openSettingsModal() {
            document.getElementById('user-api-key').value = localStorage.getItem('user_gemini_key') || "";
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('settings-modal').classList.add('flex');
        }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() {
            const key = document.getElementById('user-api-key').value.trim();
            localStorage.setItem('user_gemini_key', key);
            showToast("تنظیمات با موفقیت ذخیره شد ✅");
            closeSettingsModal();
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { currentImageBase64 = e.target.result; displayImagePreview(currentImageBase64); };
                reader.readAsDataURL(file);
            }
        }

        function displayImagePreview(base64) {
            const preview = document.getElementById('image-preview');
            const placeholder = document.getElementById('image-placeholder');
            const removeBtn = document.getElementById('remove-image-btn');
            preview.src = base64; preview.classList.remove('hidden'); placeholder.classList.add('hidden'); removeBtn.classList.remove('hidden');
        }

        function removeImage() {
            currentImageBase64 = null;
            document.getElementById('post-image-input').value = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-placeholder').classList.remove('hidden');
            document.getElementById('remove-image-btn').classList.add('hidden');
        }

        async function generateAICaption() {
            const title = document.getElementById('post-title').value;
            const description = document.getElementById('post-desc').value;
            const platform = document.getElementById('post-platform').value;
            const category = document.getElementById('post-category').value;
            const captionArea = document.getElementById('post-caption');
            const aiBtn = document.getElementById('ai-generate-btn');
            const aiIcon = document.getElementById('ai-icon');

            const key = localStorage.getItem('user_gemini_key');
            if (!key) { showToast("ابتدا کلید API را در تنظیمات وارد کنید."); openSettingsModal(); return; }
            if (!title) { showToast("لطفاً ابتدا عنوان محتوا را وارد کنید"); return; }
            
            aiBtn.disabled = true;
            aiIcon.classList.add('animate-spin-custom');
            showToast("هوش مصنوعی در حال پردازش...");

            const systemPrompt = `تو یک مدیر محتوای حرفه‌ای برای پیام‌رسان‌های ایرانی هستی. لحن تو باید "نیمه رسمی" و جذاب باشد. متن تولیدی شامل تیتر جذاب، بدنه پست متناسب با دسته محتوا، لیست نشانه‌دار و CTA باشد. زبان: فارسی. فقط متن کپشن را برگردان.`;
            const userPrompt = `موضوع: "${title}". توضیحات تکمیلی: "${description || 'ندارد'}". پلتفرم: "${platform}"، دسته محتوا: "${category}".`;

            try {
                // استفاده از نسخه پایدار v1 که آدرس صحیح برای مدل 1.5-flash است
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\n\n" + userPrompt }] }]
                    })
                });

                const result = await response.json();
                
                if (response.ok && result.candidates?.[0]?.content?.parts?.[0]?.text) {
                    captionArea.value = result.candidates[0].content.parts[0].text.trim();
                    showToast("کپشن با موفقیت تولید شد ✨");
                } else {
                    const statusCode = response.status;
                    const errorMsg = result.error ? result.error.message : "خطای سرویس";
                    
                    if (statusCode === 404) {
                        showToast("خطای ۴۰۴: مدل یا آدرس هوش مصنوعی توسط گوگل تغییر یافته است.");
                    } else if (statusCode === 403) {
                        showToast("خطای ۴۰۳: منطقه جغرافیایی شما مسدود است (تحریم). فیلترشکن خود را تغییر دهید.");
                    } else {
                        showToast(`خطای هوش مصنوعی (${statusCode}): ${errorMsg}`);
                    }
                    console.error("Gemini Debug Detail:", result);
                }
            } catch (error) {
                showToast("خطای شبکه! لطفاً اتصال فیلترشکن خود را بررسی کنید.");
            } finally {
                aiBtn.disabled = false;
                aiIcon.classList.remove('animate-spin-custom');
            }
        }

        function openModal(editId = null, prefillDate = null) {
            const form = document.getElementById('content-form');
            form.reset(); removeImage();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = "ثبت محتوای جدید";
            if(prefillDate) document.getElementById('post-date').value = prefillDate;

            if(editId) {
                const item = contentData.find(i => i.id === editId);
                if(item) {
                    document.getElementById('modal-title').innerText = "ویرایش محتوا";
                    document.getElementById('edit-id').value = item.id;
                    document.getElementById('post-date').value = item.date;
                    document.getElementById('post-time').value = item.time || '';
                    document.getElementById('post-title').value = item.title;
                    document.getElementById('post-desc').value = item.description || '';
                    document.getElementById('post-platform').value = item.platform;
                    document.getElementById('post-category').value = item.category || 'اطلاع‌رسانی';
                    document.getElementById('post-format').value = item.format;
                    document.getElementById('post-caption').value = item.caption;
                    document.getElementById('post-status').value = item.status;
                    if (item.image) { currentImageBase64 = item.image; displayImagePreview(currentImageBase64); }
                }
            }
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function manualSave() { saveToStorage(); showToast("تغییرات با موفقیت ذخیره شدند ✅"); }
        function openConfirmModal(id) { pendingDeleteId = id; document.getElementById('confirm-modal').classList.remove('hidden'); document.getElementById('confirm-modal').classList.add('flex'); }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

        document.getElementById('btn-confirm-delete').addEventListener('click', function() {
            if(pendingDeleteId) { contentData = contentData.filter(i => i.id !== pendingDeleteId); saveAndRender(); showToast("پست حذف شد"); closeConfirmModal(); }
        });

        document.getElementById('content-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const newItem = {
                id: editId || Date.now().toString(),
                date: document.getElementById('post-date').value,
                time: document.getElementById('post-time').value,
                title: document.getElementById('post-title').value,
                description: document.getElementById('post-desc').value,
                platform: document.getElementById('post-platform').value,
                category: document.getElementById('post-category').value,
                format: document.getElementById('post-format').value,
                caption: document.getElementById('post-caption').value,
                status: document.getElementById('post-status').value,
                image: currentImageBase64
            };
            if(editId) { const idx = contentData.findIndex(i => i.id === editId); contentData[idx] = newItem; }
            else { contentData.push(newItem); }
            saveAndRender(); closeModal(); showToast("در تقویم ثبت شد");
        });

        function saveToStorage() { localStorage.setItem('socialPlanDataV2', JSON.stringify(contentData)); }
        function saveAndRender() { saveToStorage(); renderDashboard(); updateStats(); }

        function renderDashboard() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            if(contentData.length === 0) { document.getElementById('empty-state').classList.remove('hidden'); return; }
            document.getElementById('empty-state').classList.add('hidden');

            const groups = {};
            contentData.forEach(i => { if(!groups[i.date]) groups[i.date] = []; groups[i.date].push(i); });
            const sortedDateStrings = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));
            if (sortedDateStrings.length === 0) return;

            const startDate = new Date(sortedDateStrings[0]);
            const endDate = new Date(sortedDateStrings[sortedDateStrings.length - 1]);
            const allDates = [];
            let curr = new Date(startDate);
            while (curr <= endDate) { allDates.push(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate() + 1); }

            allDates.forEach(dateStr => {
                const dateObj = new Date(dateStr);
                const formattedDate = dateObj.toLocaleDateString('fa-IR', { weekday: 'long', day: 'numeric', month: 'long' });
                const card = document.createElement('div');
                
                if (groups[dateStr]) {
                    card.className = "optimized-card day-card rounded-[2.5rem] p-6 flex flex-col h-fit shadow-sm";
                    const dayPosts = groups[dateStr].sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));
                    let postsHtml = '';
                    dayPosts.forEach(post => {
                        postsHtml += `
                            <div class="post-entry group">
                                <div class="flex items-start gap-4 text-right">
                                    <div class="p-2 rounded-xl bg-slate-50 text-slate-400">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-start">
                                            <h4 class="font-bold text-slate-800 text-sm mb-1">${post.title}</h4>
                                            <span class="text-[10px] font-black text-slate-400 font-mono">${post.time || '--:--'}</span>
                                        </div>
                                        <div class="flex flex-wrap items-center gap-2 mb-2">
                                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-lg bg-indigo-50 text-indigo-600">${post.platform}</span>
                                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-lg bg-slate-100 text-slate-600">${post.category}</span>
                                        </div>
                                        ${post.image ? `<div class="w-full h-32 rounded-xl overflow-hidden mb-3 border border-slate-100 shadow-sm"><img src="${post.image}" class="w-full h-full object-cover"></div>` : ''}
                                        ${post.caption ? `<p class="text-[11px] text-slate-600 line-clamp-3 mb-3 bg-slate-50 p-3 rounded-xl leading-6 whitespace-pre-wrap">${post.caption}</p>` : ''}
                                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all no-print">
                                            <button onclick="openModal('${post.id}')" class="text-[10px] font-bold text-indigo-600 hover:underline">ویرایش</button>
                                            <button onclick="openConfirmModal('${post.id}')" class="text-[10px] font-bold text-rose-500 hover:underline">حذف</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    card.innerHTML = `
                        <div class="day-card-header">
                            <h3>${formattedDate}</h3>
                            <div class="header-stats"><span class="post-count-badge">${dayPosts.length} پست</span><button onclick="openModal(null, '${dateStr}')" class="add-day-btn no-print w-6 h-6 bg-indigo-600 text-white rounded-full flex items-center justify-center mr-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button></div>
                        </div>
                        <div class="space-y-1">${postsHtml}</div>
                    `;
                } else {
                    card.className = "optimized-card empty-day-card rounded-[2.5rem] p-6 flex flex-col justify-center items-center h-44 shadow-none";
                    card.innerHTML = `
                        <div class="day-card-header w-full"><h3>${formattedDate}</h3><div class="header-stats"><button onclick="openModal(null, '${dateStr}')" class="add-day-btn no-print float-left w-6 h-6 bg-slate-200 text-slate-500 rounded-full flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button></div></div>
                        <div class="mt-4 text-slate-400 text-[11px] font-bold">بدون محتوا</div>
                    `;
                }
                container.appendChild(card);
            });
        }

        function updateStats() {
            const total = contentData.length;
            const draft = contentData.filter(i => i.status === 'draft').length;
            const scheduled = contentData.filter(i => i.status === 'scheduled').length;
            const published = contentData.filter(i => i.status === 'published').length;

            document.getElementById('stats-container').innerHTML = `
                <div class="optimized-card p-4 rounded-2xl shadow-sm"><p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">کل پست‌ها</p><p class="text-2xl font-black text-slate-800">${total}</p></div>
                <div class="optimized-card p-4 rounded-2xl border-r-4 border-amber-400 shadow-sm"><p class="text-[10px] text-amber-500 font-bold mb-1 uppercase tracking-widest">پیش‌نویس</p><p class="text-2xl font-black text-slate-800">${draft}</p></div>
                <div class="optimized-card p-4 rounded-2xl border-r-4 border-blue-500 shadow-sm"><p class="text-[10px] text-blue-500 font-bold mb-1 uppercase tracking-widest">زمان‌بندی</p><p class="text-2xl font-black text-slate-800">${scheduled}</p></div>
                <div class="optimized-card p-4 rounded-2xl border-r-4 border-emerald-500 shadow-sm"><p class="text-[10px] text-emerald-500 font-bold mb-1 uppercase tracking-widest">منتشر شده</p><p class="text-2xl font-black text-slate-800">${published}</p></div>
            `;
        }

        function exportPDF() {
            if(contentData.length === 0) return showToast("تقویم خالی است");
            showToast("در حال تولید PDF... لطفاً صبور باشید");
            window.scrollTo(0,0);
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: [10, 5, 10, 5],
                filename: `Social-Media-Plan.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: false, width: 800, windowWidth: 800 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save().then(() => showToast("PDF آماده شد ✅"));
        }

        window.onload = function() { renderDashboard(); updateStats(); };
    </script>
</body>
</html>
